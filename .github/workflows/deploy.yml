name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            PROJECT_DIR="${{ secrets.VPS_PROJECT_DIR }}"

            # Pull latest code
            cd "$PROJECT_DIR"
            git pull origin main

            # 1. Update Backend - use absolute path
            cd "$PROJECT_DIR/nest_backend"
            npm install
            npm run build
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js

            # 2. Update Frontend - use absolute path to avoid directory confusion
            cd "$PROJECT_DIR/next_frontend"
            npm install
            npm run build
            pm2 restart next-frontend || pm2 start "npm run start" --name "next-frontend"

            # Save PM2 state
            pm2 save
