name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
    paths:
      - "nest_backend/**"
      - "ecosystem.config.js"
      - ".github/workflows/deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to the project directory
            cd ${{ secrets.VPS_PROJECT_DIR }}

            # Pull latest code
            git pull origin main

            # 1. Update Backend
            cd nest_backend
            npm install
            npm run build
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            cd ..

            # 2. Update Frontend
            cd next_frontend
            npm install
            npm run build
            # If there's no PM2 config for frontend, restart the existing process if it's named 'next-frontend'
            # Or better, let's assume it's also in PM2. 
            # (I will advise the user to ensure frontend is also in PM2)
            pm2 restart next-frontend || pm2 start "npm run start" --name "next-frontend"

            # Save PM2 state
            pm2 save
