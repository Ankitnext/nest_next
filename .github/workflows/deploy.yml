name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to the project directory
            cd ${{ secrets.VPS_PROJECT_DIR }}

            # Pull latest code
            git pull origin main

            # 1. Update Backend
            cd nest_backend
            npm install
            npm run build
            pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
            cd ..

            # 2. Update Frontend - always rebuild to pick up code changes
            cd next_frontend
            npm install
            npm run build
            pm2 restart next-frontend || pm2 start "npm run start" --name "next-frontend"

            # Save PM2 state
            pm2 save
