name: Deploy to VPS

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "staging" ]; then
              PROJECT_DIR="/root/nest_next_staging"
              export PM2_APP_NAME="nest-backend-staging"
              export FRONTEND_APP_NAME="next-frontend-staging"
              export PORT=3003
              export FRONTEND_PORT=3002
            else
              PROJECT_DIR="/root/nest_next"
              export PM2_APP_NAME="nest-backend"
              export FRONTEND_APP_NAME="next-frontend"
              export PORT=3001
              export FRONTEND_PORT=3000
            fi
            
            echo "Deploying branch $BRANCH to $PROJECT_DIR"
            
            # Navigate to directory and pull
            mkdir -p $PROJECT_DIR
            cd $PROJECT_DIR
            
            if [ ! -d ".git" ]; then
              git clone -b $BRANCH https://github.com/Ankitnext/nest_next.git .
            else
              git fetch origin
              git checkout $BRANCH
              git pull origin $BRANCH
            fi
            
            # --- NEXT.JS FRONTEND ---
            echo "Building Frontend..."
            cd next_frontend
            npm install
            npm run build
            
            # Start or Restart Frontend dynamically
            pm2 describe $FRONTEND_APP_NAME > /dev/null
            if [ $? -eq 0 ]; then
              PORT=$FRONTEND_PORT pm2 restart $FRONTEND_APP_NAME --update-env
            else
              PORT=$FRONTEND_PORT pm2 start npm --name "$FRONTEND_APP_NAME" -- start
            fi
            
            # --- NEST.JS BACKEND ---
            echo "Building Backend..."
            cd ../nest_backend
            
            # Write env vars from GitHub Secrets based on branch
            if [ "$BRANCH" = "staging" ]; then
              printf 'DATABASE_URL=%s\n' "${{ secrets.STAGING_DATABASE_URL }}" > .env
              printf 'JWT_SECRET=%s\n' "${{ secrets.STAGING_JWT_SECRET }}" >> .env
              printf 'RAZORPAY_KEY_ID=%s\n' "${{ secrets.STAGING_RAZORPAY_KEY_ID }}" >> .env
              printf 'RAZORPAY_KEY_SECRET=%s\n' "${{ secrets.STAGING_RAZORPAY_KEY_SECRET }}" >> .env
            else
              printf 'DATABASE_URL=%s\n' "${{ secrets.DATABASE_URL }}" > .env
              printf 'JWT_SECRET=%s\n' "${{ secrets.JWT_SECRET }}" >> .env
              printf 'RAZORPAY_KEY_ID=%s\n' "${{ secrets.RAZORPAY_KEY_ID }}" >> .env
              printf 'RAZORPAY_KEY_SECRET=%s\n' "${{ secrets.RAZORPAY_KEY_SECRET }}" >> .env
            fi
            printf 'PORT=%s\n' "$PORT" >> .env
            printf 'REDIS_URL=%s\n' "${{ secrets.REDIS_URL }}" >> .env
            
            npm install
            npm run build
            
            # Start or Restart Backend dynamically
            pm2 describe $PM2_APP_NAME > /dev/null
            if [ $? -eq 0 ]; then
              pm2 restart ecosystem.config.js --update-env
            else
              pm2 start ecosystem.config.js --update-env
            fi
            
            pm2 save
            echo "Deployment to $BRANCH completed successfully!"
